<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Login</title>
</head>
<body>
    <form>
        <div><input type="text" placeholder="Name" required/>&nbsp;&nbsp;&nbsp;
        <input type="number" value="mobile number" placeholder="10-digit mobile number"/></div><br>
        <div><input type="text" placeholder="Pincode"/>&nbsp;&nbsp;&nbsp;
        <input type="text" placeholder="Locality"/></div><br>
        <div> <textarea rows="4" cols="46" placeholder="Address(Area and Street)"></textarea></div><br>
        <div><input type="text" placeholder="City/District/Town"/>&nbsp;&nbsp;&nbsp;
        <select>
            <option>--Select State--</option>
        </select></div><br>
        <div>
            <input type="text" placeholder="Landmark(Optional)"/>&nbsp;&nbsp;&nbsp;
            <input type="text" placeholder="Alternate Phone(Optional)" disabled/>
        </div><br>
        <div>Address Type</div><br>
        <div>
        <input type="radio" name="work type" />Home&nbsp;&nbsp;&nbsp;
        <input type="radio" name="work type" />Work&nbsp;&nbsp;&nbsp;
       </div><br>
       <input type="submit" value="SAVE"/>&nbsp;&nbsp;
       <input type="reset" value="CANCEL"/>
        
    </form>
</body>
</html>
